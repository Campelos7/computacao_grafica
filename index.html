<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake 3D - Three.js</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #c9ebff 0%, #9fd8ff 35%, #77c268 100%);
        font-family: Arial, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 10px;
        left: 10px;
        color: #e6f8ff;
        background: linear-gradient(135deg, rgba(242, 251, 255, 0.72), rgba(224, 244, 255, 0.58));
        border: 1px solid rgba(105, 164, 212, 0.35);
        box-shadow: 0 10px 24px rgba(27, 56, 88, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(5px);
        padding: 12px 14px;
        border-radius: 12px;
        line-height: 1.35;
        user-select: none;
        z-index: 20;
      }

      .hud .title {
        font-weight: 700;
        margin-bottom: 5px;
        color: #1f5478;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      #score {
        color: #2d7a33;
        font-weight: 700;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./js/main.js"></script>
  </body>
  </html>
